<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Mirror Link</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111520;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:monospace}
#ui-top{width:800px;padding:8px 12px;display:flex;align-items:center;gap:10px}
#level-dots{display:flex;gap:4px;flex-wrap:wrap;max-width:180px}
.level-dot{width:7px;height:7px;border-radius:50%;background:#222740;transition:background .3s}
.level-dot.done{background:#00cc44}
.level-dot.current{background:#fff}
#bar-wrap{flex:1;position:relative;height:14px}
#bar-container{width:100%;height:100%;background:#1c2035;border-radius:3px;overflow:hidden;border:1px solid #2e3455}
#bar-fill{height:100%;width:100%;background:#00cc44;transition:background .12s;transform-origin:left}
#bar-shake{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#level-label{font-size:11px;color:#445;letter-spacing:2px;min-width:64px;text-align:right}
#game-wrap{position:relative;width:800px;height:500px}
canvas{display:block;border-radius:4px;box-shadow:0 0 40px rgba(0,0,0,.7)}
#overlay{position:absolute;top:0;left:0;width:800px;height:500px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,10,18,.9);gap:20px;border-radius:4px;backdrop-filter:blur(2px)}
#overlay.hidden{display:none}
.overlay-title{font-size:32px;font-weight:bold;letter-spacing:6px;color:#fff;text-shadow:0 0 30px rgba(0,200,100,.4)}
.overlay-sub{font-size:13px;color:#556;letter-spacing:3px}
.overlay-hint{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:580px}
.hint-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#778}
.hint-dot{width:10px;height:10px;border-radius:50%}
.hint-sq{width:10px;height:10px}
.hint-tri{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:10px solid #ff6633}
.overlay-keys{font-size:10px;color:#334;letter-spacing:1px;margin-top:4px}
.btn{padding:10px 32px;background:transparent;border:1px solid #334;color:#89a;font-family:monospace;font-size:12px;letter-spacing:3px;cursor:pointer;border-radius:2px;transition:all .2s}
.btn:hover{border-color:#00cc44;color:#00cc44;box-shadow:0 0 12px rgba(0,200,80,.2)}
</style>
</head>

<div id="ui-top">
  <div id="level-dots"></div>

    <div id="bar-container"><div id="bar-fill"></div></div>
  </div>
  <div id="level-label">LV 1</div>

    <div class="overlay-sub"   id="overlay-sub">双轴同步解谜</div>

      <div class="hint-item"><div class="hint-sq"  style="background:#44ffb0"></div>延长连线</div>
      <div class="hint-item"><div class="hint-sq"  style="background:#ffd700"></div>护盾（免死一次）</div>

      <div class="hint-item"><div class="hint-tri"></div>陷阱</div>
    </div>
    <button class="btn" id="start-btn">WASD / 方向键 开始</button>
    <div class="overlay-keys">R 重开关卡　Esc 返回菜单</div>
  </div>
</div>

let levels=mkLevels();

// ── Load Level ────────────────────────────────────
function loadLv(idx){
  level=JSON.parse(JSON.stringify(levels[idx]));
  Lmax=level.lmax;
  pA=mkP(level.sA.x,level.sA.y);
  pB=mkP(level.sB.x,level.sB.y);
  items=[];
  let gk=0;
  for(const it of level.it){
    if(it.side==='both'){
      const k=gk++;
      items.push({...it,alive:true,pulse:Math.random()*Math.PI*2,_r:'A',_k:k});
      items.push({...it,alive:true,pulse:Math.random()*Math.PI*2,_r:'B',_k:k});
    } else {
      items.push({...it,alive:true,pulse:Math.random()*Math.PI*2,_r:it.side,_k:gk++});
    }
  }
  goalA=false;goalB=false;
  dp=[];pp=[];trail=[];flash=0;greenFlash=0;dtimer=0;ctimer=0;
  barRatio=1;barRatioDisp=1;shakeX=0;shakeY=0;
  updDots();
  levelLabel.textContent='LV '+(idx+1);
}
function updDots(){
  for(let i=0;i<TOTAL;i++){
    const d=document.getElementById('dot'+i);
    if(d) d.className='level-dot'+(i<lvIdx?' done':i===lvIdx?' current':'');
  }
}

// ── Collision ─────────────────────────────────────
function cRect(cx,cy,r,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  return (cx-nx)**2+(cy-ny)**2<r*r;
}
function resolveW(p,walls){
  for(let i=0;i<4;i++){
    for(const w of walls){
      if(!cRect(p.x,p.y,RADIUS,w.x,w.y,w.w,w.h))continue;
      const cx=w.x+w.w/2,cy=w.y+w.h/2,dx=p.x-cx,dy=p.y-cy;
      const ox=w.w/2+RADIUS-Math.abs(dx),oy=w.h/2+RADIUS-Math.abs(dy);
      if(ox<oy){p.x+=Math.sign(dx)*ox;p.vx=0;}else{p.y+=Math.sign(dy)*oy;p.vy=0;}
    }
  }
}

// ── Items ─────────────────────────────────────────
function pickup(item,player){
  for(const it of items)if(it._k===item._k)it.alive=false;
  const sx=item._r==='B'?item.x+HALF:item.x;
  if(item.type==='extend'){Lmax+=item.amount;spawnP(sx,item.y,'#44ffb0');}
  else if(item.type==='shield'){player.hasShield=true;player.sf=0;spawnP(sx,item.y,'#ffd700');}
  else{Lmax=Math.max(40,Lmax-item.amount);spawnP(sx,item.y,'#ff5555');}
}

// ── Particles ─────────────────────────────────────
function spawnD(x,y){
  for(let i=0;i<28;i++){
    const a=Math.random()*Math.PI*2,s=1.2+Math.random()*3.5;
    dp.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,r:1.5+Math.random()*3});
  }
}
function spawnP(x,y,c){
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2,s=0.8+Math.random()*2.5;
    pp.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,r:1.5+Math.random()*2.5,color:c});
  }
}
function stepP(dt){
  for(const p of dp){p.x+=p.vx;p.y+=p.vy;p.vx*=.90;p.vy*=.90;p.life-=.024*dt;}
  for(const p of pp){p.x+=p.vx;p.y+=p.vy;p.vx*=.89;p.vy*=.89;p.life-=.030*dt;}
  dp=dp.filter(p=>p.life>0);
  pp=pp.filter(p=>p.life>0);
  // trail decay
  for(const t of trail)t.life-=.06*dt;
  trail=trail.filter(t=>t.life>0);
}

// ── Death / Clear ──────────────────────────────────
function die(x,y){
  if(gs!=='playing')return;
  spawnD(x,y);
  flash=0.7;
  gs='dead';
  dtimer=1.4;
}

// ── Update ────────────────────────────────────────
let lastTs=0;
function update(ts){
  const dt=Math.min((ts-lastTs)/16.67,3);lastTs=ts;
  stepP(dt);

  // Shake decay
  shakeX*=0.7;shakeY*=0.7;

  if(gs==='dead'){
    dtimer-=dt*.045;
    if(flash>0)flash-=dt*.04;
    if(dtimer<=0){loadLv(lvIdx);gs='playing';}
    return;
  }
  if(gs==='levelclear'){
    ctimer-=dt*.04;
    if(greenFlash>0)greenFlash-=dt*.035;
    if(ctimer<=0){
      lvIdx++;
      if(lvIdx>=TOTAL){gs='win';showOv('ALL CLEAR','全25关通关！');return;}
      loadLv(lvIdx);gs='playing';
    }
    return;
  }
  if(gs!=='playing')return;
  if(flash>0)flash-=dt*.04;

  // ─ Movement with snappier feel ─
  const{dx,dy}=inp();
  const hasInput=(dx!==0||dy!==0);
  if(hasInput){
    // Accelerate toward target
    pA.vx+=(dx*SPEED-pA.vx)*ACCEL;pA.vy+=(dy*SPEED-pA.vy)*ACCEL;
    pB.vx+=(dx*SPEED-pB.vx)*ACCEL;pB.vy+=(dy*SPEED-pB.vy)*ACCEL;
  } else {
    // Brake faster when no input
    pA.vx*=(1-BRAKE);pA.vy*=(1-BRAKE);
    pB.vx*=(1-BRAKE);pB.vy*=(1-BRAKE);
    // Snap to zero to avoid micro-drift
    if(Math.abs(pA.vx)<0.04)pA.vx=0;if(Math.abs(pA.vy)<0.04)pA.vy=0;
    if(Math.abs(pB.vx)<0.04)pB.vx=0;if(Math.abs(pB.vy)<0.04)pB.vy=0;
  }

  // Trail
  const speed2A=pA.vx*pA.vx+pA.vy*pA.vy;
  const speed2B=pB.vx*pB.vx+pB.vy*pB.vy;
  if(speed2A>0.5)trail.push({x:pA.x,y:pA.y,side:'A',life:1});
  if(speed2B>0.5)trail.push({x:pB.x,y:pB.y,side:'B',life:1});

  pA.x+=pA.vx;pA.y+=pA.vy;
  pB.x+=pB.vx;pB.y+=pB.vy;
  const pad=RADIUS,rw=HALF-20;
  pA.x=Math.max(pad,Math.min(rw-pad,pA.x));pA.y=Math.max(pad,Math.min(H-pad,pA.y));
  pB.x=Math.max(pad,Math.min(rw-pad,pB.x));pB.y=Math.max(pad,Math.min(H-pad,pB.y));
  resolveW(pA,level.wA);resolveW(pB,level.wB);

  // ─ Traps ─
  for(const t of level.tA){
    t.angle+=t.speed;
    if(Math.hypot(pA.x-t.x,pA.y-t.y)<RADIUS+t.size&&pA.ifr<=0){
      if(pA.hasShield){pA.hasShield=false;pA.sf=1.2;pA.ifr=90;spawnP(pA.x,pA.y,'#ffd700');}
      else{die(pA.x,pA.y);return;}
    }
  }
  for(const t of level.tB){
    t.angle+=t.speed;
    if(Math.hypot(pB.x-t.x,pB.y-t.y)<RADIUS+t.size&&pB.ifr<=0){
      if(pB.hasShield){pB.hasShield=false;pB.sf=1.2;pB.ifr=90;spawnP(pB.x+HALF,pB.y,'#ffd700');}
      else{die(pB.x+HALF,pB.y);return;}
    }
  }
  if(pA.sf>0)pA.sf-=dt*.045;if(pB.sf>0)pB.sf-=dt*.045;
  if(pA.ifr>0)pA.ifr-=dt;if(pB.ifr>0)pB.ifr-=dt;

  // ─ Items ─
  for(const it of items){
    if(!it.alive)continue;
    it.pulse+=.07;
    const p=it._r==='A'?pA:pB;
    if(Math.hypot(p.x-it.x,p.y-it.y)<RADIUS+13)pickup(it,p);
  }

  // ─ Distance ─
  const d=Math.hypot(pA.x-pB.x,pA.y-pB.y);
  barRatio=Math.max(0,1-d/Lmax);
  barRatioDisp+=(barRatio-barRatioDisp)*0.15; // smooth bar display
  if(d>Lmax){
    shakeX=(Math.random()-.5)*8;shakeY=(Math.random()-.5)*8;
    flash=0.8;
    die((pA.x+pB.x+HALF)/2,(pA.y+pB.y)/2);
    return;
  }
  // Bar color
  const c=barRatioDisp>.6?'#00cc44':barRatioDisp>.3?`hsl(${Math.round(40+barRatioDisp*80)},90%,50%)`:'#ff5500';
  barFill.style.width=(barRatioDisp*100)+'%';
  barFill.style.background=c;
  // Shake bar when critical
  const barEl=document.getElementById('bar-container');
  if(barRatio<0.2&&gs==='playing'){
    const s=(0.2-barRatio)*14;
    barEl.style.transform=`translateX(${(Math.random()-.5)*s}px)`;
  } else {
    barEl.style.transform='';
  }

  // ─ Goals ─
  goalA=Math.hypot(pA.x-level.gA.x,pA.y-level.gA.y)<level.gA.r+RADIUS-4;
  goalB=Math.hypot(pB.x-level.gB.x,pB.y-level.gB.y)<level.gB.r+RADIUS-4;
  if(goalA&&goalB){
    gs='levelclear';ctimer=1.7;greenFlash=1;
    spawnP(level.gA.x,level.gA.y,'#00ff88');
    spawnP(level.gB.x+HALF,level.gB.y,'#00ff88');
    spawnP(level.gA.x,level.gA.y,'#ffffff');
    spawnP(level.gB.x+HALF,level.gB.y,'#ffffff');
  }
}

// ── Draw ──────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  if(!level)return;

  ctx.save();
  if(shakeX||shakeY)ctx.translate(shakeX,shakeY);

  // Backgrounds
  ctx.fillStyle='#1a1e30';ctx.fillRect(0,0,HALF-2,H);
  ctx.fillStyle='#181c2c';ctx.fillRect(HALF+2,0,HALF-2,H);
  ctx.fillStyle='#20243c';ctx.fillRect(HALF-2,0,4,H);

  // Subtle dot-grid background
  drawGrid(0,0,HALF-2,'A');
  drawGrid(HALF+2,0,HALF-2,'B');

  drawRoom(0,level.wA,level.tA,pA,level.gA,'A');
  drawRoom(HALF,level.wB,level.tB,pB,level.gB,'B');

  // Items
  for(const it of items){
    if(!it.alive)continue;
    drawItem(it.x+(it._r==='B'?HALF:0),it.y,it.type,it.pulse);
  }

  drawLink();

  // Particles
  ctx.save();
  for(const p of dp){
    ctx.globalAlpha=p.life*p.life;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  }
  for(const p of pp){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // Flash overlays
  if(flash>0){
    ctx.fillStyle=`rgba(255,30,30,${flash*.38})`;
    ctx.fillRect(0,0,W,H);
  }
  if(greenFlash>0){
    ctx.fillStyle=`rgba(0,220,90,${greenFlash*.25})`;
    ctx.fillRect(0,0,W,H);
  }

  ctx.restore(); // restore shake translate
}

function drawGrid(ox,oy,w,side){
  const col=side==='A'?'rgba(80,100,180,.04)':'rgba(60,90,160,.04)';
  ctx.save();ctx.translate(ox,oy);
  ctx.strokeStyle=col;ctx.lineWidth=1;
  const step=30;
  for(let x=step;x<w;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=step;y<H;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  ctx.restore();
}

function drawRoom(ox,walls,traps,player,goal,side){
  ctx.save();ctx.translate(ox,0);
  const isA=side==='A';

  // Trails (drawn before player, under walls)
  for(const t of trail){
    if(t.side!==side)continue;
    const col=isA?`rgba(255,80,80,${t.life*.18})`:`rgba(80,140,255,${t.life*.18})`;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(t.x,t.y,RADIUS*.7*t.life,0,Math.PI*2);ctx.fill();
  }

  // Walls with subtle glow
  for(const w of walls){
    // Inner glow
    const wallGlow=ctx.createLinearGradient(w.x,w.y,w.x,w.y+w.h);
    wallGlow.addColorStop(0,'#464c68');
    wallGlow.addColorStop(1,'#343955');
    ctx.fillStyle=wallGlow;
    ctx.fillRect(w.x,w.y,w.w,w.h);
    // Edge highlight
    ctx.strokeStyle='rgba(120,140,200,.12)';ctx.lineWidth=1;
    ctx.strokeRect(w.x+.5,w.y+.5,w.w-1,w.h-1);
  }

  // Goal — pulsing semicircle
  const t=Date.now()/1000;
  const goalPulse=Math.sin(t*2.2)*.15+1;
  ctx.fillStyle=isA?'rgba(255,80,80,.15)':'rgba(80,140,255,.15)';
  ctx.strokeStyle=isA?'#ff7777':'#6699ff';
  ctx.lineWidth=2;
  ctx.save();
  ctx.translate(goal.x,goal.y);ctx.scale(goalPulse,goalPulse);
  ctx.beginPath();
  if(isA){ctx.arc(0,0,goal.r,-Math.PI/2,Math.PI/2);}
  else{ctx.arc(0,0,goal.r,Math.PI/2,3*Math.PI/2);}
  ctx.closePath();ctx.fill();ctx.stroke();
  // Outer glow ring
  ctx.strokeStyle=isA?'rgba(255,100,100,.2)':'rgba(100,150,255,.2)';
  ctx.lineWidth=6;
  ctx.beginPath();
  if(isA){ctx.arc(0,0,goal.r+5,-Math.PI/2,Math.PI/2);}
  else{ctx.arc(0,0,goal.r+5,Math.PI/2,3*Math.PI/2);}
  ctx.stroke();
  ctx.restore();

  // Traps
  for(const tr of traps)drawTrap(tr.x,tr.y,tr.size,tr.angle);

  // Player
  drawPlayer(player,side);
  ctx.restore();
}

function drawPlayer(p,side){
  const col=side==='A'?'#ff4444':'#4488ff';
  const glow=side==='A'?'rgba(255,80,80,':' rgba(60,130,255,';
  const vis=p.ifr<=0||Math.floor(p.ifr/6)%2===0;

  // Shield aura
  if(p.hasShield){
    const t=Date.now()/1000;
    const pulse=Math.sin(t*4)*.15+1;
    ctx.strokeStyle='rgba(255,215,0,.9)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(p.x,p.y,(RADIUS+6)*pulse,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(255,215,0,.18)';ctx.lineWidth=9;
    ctx.beginPath();ctx.arc(p.x,p.y,(RADIUS+11)*pulse,0,Math.PI*2);ctx.stroke();
  } else if(p.sf>0){
    // Shield break flash
    ctx.strokeStyle=`rgba(255,255,255,${Math.min(1,p.sf)})`;ctx.lineWidth=5;
    ctx.beginPath();ctx.arc(p.x,p.y,RADIUS+8,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=`rgba(255,215,0,${Math.min(1,p.sf*.6)})`;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(p.x,p.y,RADIUS+14,0,Math.PI*2);ctx.stroke();
  }

  if(!vis)return;

  // Soft outer glow
  const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,RADIUS*2.8);
  g.addColorStop(0,col+'55');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,RADIUS*2.8,0,Math.PI*2);ctx.fill();

  // Body
  const bodyG=ctx.createRadialGradient(p.x-3,p.y-3,1,p.x,p.y,RADIUS);
  bodyG.addColorStop(0,col+'ff');
  bodyG.addColorStop(1,col.replace('ff','bb')+'cc');
  ctx.fillStyle=bodyG;
  ctx.beginPath();ctx.arc(p.x,p.y,RADIUS,0,Math.PI*2);ctx.fill();

  // Specular
  ctx.fillStyle='rgba(255,255,255,.32)';
  ctx.beginPath();ctx.arc(p.x-4,p.y-4,RADIUS*.38,0,Math.PI*2);ctx.fill();
}

function drawTrap(x,y,size,angle){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  // Glow
  ctx.shadowColor='#ff6600';ctx.shadowBlur=10;
  ctx.fillStyle='#ff5520';ctx.strokeStyle='#ff8050';ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(0,-size);ctx.lineTo(size*.866,size*.5);ctx.lineTo(-size*.866,size*.5);
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawItem(x,y,type,pulse){
  const s=11+Math.sin(pulse)*2.5;
  ctx.save();ctx.translate(x,y);
  const col=type==='extend'?'#44ffb0':type==='shield'?'#ffd700':'#ff3333';
  const glowCol=type==='extend'?'#00ff88':type==='shield'?'#ffcc00':'#ff2222';

  // Ambient glow
  const gr=ctx.createRadialGradient(0,0,0,0,0,s*2.8);
  gr.addColorStop(0,glowCol+'33');gr.addColorStop(1,'transparent');
  ctx.fillStyle=gr;ctx.fillRect(-s*3,-s*3,s*6,s*6);

  // Shadow glow
  ctx.shadowColor=glowCol;ctx.shadowBlur=8;
  // Body
  ctx.fillStyle=col;
  ctx.fillRect(-s/2,-s/2,s,s);
  ctx.shadowBlur=0;
  // Inner highlight
  ctx.fillStyle='rgba(255,255,255,.25)';
  ctx.fillRect(-s/2,-s/2,s*.55,s*.45);
  // Border
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;
  ctx.strokeRect(-s/2,-s/2,s,s);
  ctx.restore();
}

function drawLink(){
  const ax=pA.x,ay=pA.y,bx=pB.x+HALF,by=pB.y;
  const ratio=barRatio;
  let col;
  if(flash>0)col=`rgba(255,50,50,${.9+Math.sin(Date.now()/30)*.08})`;
  else if(ratio>.6)col='#00cc44';
  else if(ratio>.3)col=`hsl(${Math.round(40+ratio*80)},90%,55%)`;
  else col='#ff5500';

  const lw=Math.max(1,ratio*3.8);
  // Glow pass
  ctx.strokeStyle=col;ctx.lineWidth=lw+4;ctx.globalAlpha=0.12;
  ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
  ctx.globalAlpha=1;
  // Main line (dashed)
  ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.setLineDash([6,5]);
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
  ctx.setLineDash([]);
  // End dots
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(ax,ay,3.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(bx,by,3.5,0,Math.PI*2);ctx.fill();
}

// ── Overlay ───────────────────────────────────────
function showOv(t,s){
  overlayTitle.textContent=t;
  overlaySub.textContent=s;
  overlay.classList.remove('hidden');
  document.getElementById('start-btn').textContent=
    t==='MIRROR LINK'?'WASD / 方向键 开始':'再来一次';
}
function hideOv(){overlay.classList.add('hidden');}
document.getElementById('start-btn').addEventListener('click',()=>{
  if(gs==='win')lvIdx=0;
  levels=mkLevels();
  loadLv(lvIdx);
  hideOv();
  gs='playing';
});

// ── Loop ──────────────────────────────────────────
function loop(ts){update(ts);draw();requestAnimationFrame(loop);}
loadLv(0);
requestAnimationFrame(ts=>{lastTs=ts;loop(ts);});
</script>
